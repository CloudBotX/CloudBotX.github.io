<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>About - AmicoChill</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins;
}

body {
    background:#050816;
    color:white;
}

/* BG /
.bg {
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at 20% 30%, rgba(47,108,255,0.35), transparent),
    radial-gradient(circle at 80% 70%, rgba(0,200,255,0.25), transparent);
    filter:blur(90px);
    z-index:-1;
}

/ NAVBAR /
.navbar {
    position:fixed;
    width:100%;
    padding:18px 50px;
    display:flex;
    justify-content:space-between;

    backdrop-filter:blur(18px);
    background:rgba(5,10,30,0.85);
}

.navbar a {
    color:white;
    text-decoration:none;
}

/ CONTENT /
.container {
    padding-top:140px;
    text-align:center;
    max-width:800px;
    margin:auto;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

/ CARDS */
.cards {
    margin-top:50px;
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.card {
    width:220px;
    padding:30px;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    transition:0.3s;
}

.card:hover {
    transform:translateY(-12px) scale(1.05);
    box-shadow:0 0 30px rgba(0,200,255,0.6);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="navbar">
    <h2>AmicoChill</h2>
    <a href="index.html">Home</a>
</div>

<div class="container">
    <h2>RagazzoChill_</h2>

    <p>
        Sviluppatore esperto nella creazione e configurazione di bot Discord.
        Specializzato nello sviluppo di sistemi efficienti, moderni e altamente personalizzabili
        utilizzando diversi linguaggi di programmazione.
    </p>

    <div class="cards">
        <div class="card">Java</div>
        <div class="card">Skript</div>
        <div class="card">Python</div>
    </div>
</div>

</body>
</html>
