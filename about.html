<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>About - AmicoChill</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins;
}

body {
    background:#050816;
    color:white;
}

/* BG /
.bg {
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at 20% 30%, rgba(47,108,255,0.3), transparent),
    radial-gradient(circle at 80% 70%, rgba(0,200,255,0.2), transparent);
    filter:blur(80px);
    z-index:-1;
}

/ NAVBAR /
.navbar {
    position:fixed;
    width:100%;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;

    backdrop-filter:blur(15px);
    background:rgba(10,15,40,0.7);
}

.navbar a {
    color:white;
    text-decoration:none;
    opacity:0.8;
}

.container {
    padding-top:120px;
    text-align:center;
    max-width:800px;
    margin:auto;
}

/ CARDS */
.cards {
    margin-top:40px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card {
    width:200px;
    padding:25px;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    transition:0.3s;
}

.card:hover {
    transform:translateY(-10px);
    box-shadow:0 0 25px rgba(0,200,255,0.5);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="navbar">
    <h2>AmicoChill</h2>
    <a href="index.html">Home</a>
</div>

<div class="container">
    <h2>RagazzoChill_</h2>

    <p>
        Sviluppatore appassionato specializzato nella creazione e configurazione di bot Discord.
        Lavora con diversi linguaggi di programmazione per sviluppare soluzioni efficienti,
        moderne e altamente personalizzabili.
    </p>

    <div class="cards">
        <div class="card">Java</div>
        <div class="card">Skript</div>
        <div class="card">Python</div>
    </div>
</div>

</body>
</html>
