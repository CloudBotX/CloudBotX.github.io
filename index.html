<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PierLio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f0f0f0;
      text-align: center;
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 20px 0;
      font-size: 2em;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      padding: 20px;
    }
    .gallery img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
    footer {
      background: #333;
      color: white;
      padding: 10px 0;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <header>
    PierLio
  </header>

  <div class="gallery">
    <img src="IMG_1993.jpeg" alt="Immagine 1">
    <img src="IMG_1993.jpeg" alt="Immagine 2">
    <img src="IMG_1993.jpeg" alt="Immagine 3">
    <img src="IMG_1993.jpeg" alt="Immagine 4">
  </div>

  <footer>
    © 2026 PierLio - Tutti i diritti riservati
  </footer>

</body>
</html>
