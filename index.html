<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AmicoChill</title>

<meta property="og:title" content="AmicoChill Bot">
<meta property="og:description" content="Un bot Discord moderno, veloce e potente.">
<meta property="og:image" content="logo.png">
<meta property="og:url" content="https://cloudbotx.github.io">
<meta name="theme-color" content="#2f6cff">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins;
}

body {
    background:#050816;
    color:white;
    overflow:hidden;
}

/* 🌊 BACKGROUND /
.bg {
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at 20% 30%, rgba(47,108,255,0.35), transparent),
    radial-gradient(circle at 80% 70%, rgba(0,200,255,0.25), transparent);
    filter:blur(90px);
    animation:move 12s infinite alternate ease-in-out;
    z-index:-1;
}

@keyframes move {
    0% {transform:translateY(0);}
    100% {transform:translateY(-60px);}
}

/ 💎 NAVBAR FIX /
.navbar {
    position:fixed;
    top:0;
    width:100%;
    padding:18px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;

    backdrop-filter:blur(18px);
    background:rgba(5,10,30,0.85);
    border-bottom:1px solid rgba(255,255,255,0.08);

    z-index:100;
}

.navbar h2 {
    font-weight:600;
}

/ 🔥 FIX LINK /
.navbar a,
.navbar a:visited,
.navbar a:active {
    color:white;
    text-decoration:none !important;
    border:none !important;
    outline:none;
    opacity:0.85;
}

.navbar a:hover {
    opacity:1;
}

/ HERO /
.hero {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    gap:15px;

    animation:fadeIn 1.2s ease;
}

/ fade /
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

.hero img {
    width:110px;
    border-radius:12px;
    animation:float 4s infinite ease-in-out;
}

/ floating logo /
@keyframes float {
    0% {transform:translateY(0);}
    50% {transform:translateY(-10px);}
    100% {transform:translateY(0);}
}

.hero h1 {
    font-size:65px;
}

.hero p {
    max-width:520px;
    opacity:0.75;
}

/ 🔵 BUTTON FIX */
.btn {
    margin-top:25px;
    padding:18px 60px;
    font-size:18px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#2f6cff,#00c6ff);
    color:white;
    cursor:pointer;

    display:flex;
    justify-content:center;
    align-items:center;

    box-shadow:0 0 40px rgba(47,108,255,0.7);
    transition:0.3s;
}

.btn:hover {
    transform:scale(1.1);
    box-shadow:0 0 70px rgba(47,108,255,1);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="navbar">
    <h2>AmicoChill</h2>
    <a href="about.html">About</a>
</div>

<section class="hero">

    <!-- METTI QUI IL FILE -->
    <img src="logo.png">

    <h1>AmicoChill Bot</h1>

    <p>
        Un bot Discord avanzato progettato per automatizzare, gestire e migliorare
        qualsiasi server in modo semplice, veloce e completamente personalizzabile.
    </p>

    <button class="btn" onclick="inviteBot()">Invita il Bot</button>

</section>

<script>
function inviteBot() {
window.open("https://discord.com/oauth2/authorize?client_id=1479189696893419663&permissions=8&scope=bot+applications.commands");
}
</script>

</body>
</html>
