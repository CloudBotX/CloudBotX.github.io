<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AmicoChill</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins;
}

body {
    background:#050816;
    color:white;
    overflow:hidden;
}

/* 🌊 BACKGROUND LIQUIDO /
.bg {
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at 20% 30%, rgba(47,108,255,0.35), transparent),
    radial-gradient(circle at 80% 70%, rgba(0,200,255,0.25), transparent);
    filter:blur(90px);
    animation:move 12s infinite alternate ease-in-out;
    z-index:-1;
}

@keyframes move {
    0% {transform:translateY(0);}
    100% {transform:translateY(-60px);}
}

/ 💎 NAVBAR SOLIDA /
.navbar {
    position:fixed;
    top:0;
    width:100%;
    padding:18px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    backdrop-filter:blur(18px);
    background:rgba(5,10,30,0.95); / più opaca, visibile /
    border-bottom:1px solid rgba(255,255,255,0.15);
    z-index:100;
}

.navbar h2 {
    font-weight:600;
}

/ 🔹 LINK PULITI /
.navbar a,
.navbar a:visited,
.navbar a:active,
.navbar a:focus {
    color:white !important;
    text-decoration:none !important;
    outline:none !important;
    border:none !important;
    opacity:0.85;
    transition:0.2s;
}

.navbar a:hover {
    opacity:1;
}

/ HERO /
.hero {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    gap:15px;
}

/ IMMAGINE /
.hero img {
    width:120px;
    border-radius:12px;
    animation:float 4s infinite ease-in-out;
}

@keyframes float {
    0% {transform:translateY(0);}
    50% {transform:translateY(-10px);}
    100% {transform:translateY(0);}
}

.hero h1 {
    font-size:65px;
}

.hero p {
    max-width:520px;
    opacity:0.75;
}

/ 🔵 BUTTON CENTRALE */
.btn {
    margin-top:25px;
    padding:18px 60px;
    font-size:18px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#2f6cff,#00c6ff);
    color:white;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 40px rgba(47,108,255,0.7);
    transition:0.3s;
}

.btn:hover {
    transform:scale(1.1);
    box-shadow:0 0 70px rgba(47,108,255,1);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="navbar">
    <h2>AmicoChill</h2>
    <a href="about.html">About</a>
</div>

<section class="hero">
    <img src="logo.png" alt="Logo AmicoChill">
    <h1>AmicoChill Bot</h1>
    <p>
        Bot Discord avanzato progettato per automatizzare, gestire e migliorare
        il tuo server con funzioni moderne, semplici e personalizzabili.
    </p>
    <button class="btn" onclick="inviteBot()">Invita il Bot</button>
</section>

<script>
function inviteBot() {
    window.open("https://discord.com/oauth2/authorize?client_id=1479189696893419663&permissions=8&scope=bot+applications.commands");
}
</script>

</body>
</html>
