<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmicoChill Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body {
  background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  color:#fff;
}

/* Navbar */
nav {
  position:absolute;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  backdrop-filter:blur(10px);
  background: rgba(255,255,255,0.1);
  animation: fadeIn 1s ease forwards;
}
nav a {
  color:#fff;
  text-decoration:none;
  margin-left:20px;
  font-weight:600;
  transition: color 0.3s;
}
nav a:hover {color:#ffd700;}

/* Card principale */
.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  padding: 60px 40px;
  text-align:center;
  animation: float 6s ease-in-out infinite;
  z-index:1;
}
.card h1 {font-size:3rem;margin-bottom:20px;}
.card p {font-size:1.2rem;margin-bottom:30px;}

/* Pulsante grande */
.invite-btn {
  display:inline-block;
  padding:20px 40px;
  font-size:1.5rem;
  font-weight:bold;
  color:#fff;
  background: linear-gradient(135deg, #ff6ec4, #7873f5);
  border:none;
  border-radius:15px;
  cursor:pointer;
  text-decoration:none;
  transition: transform 0.3s, box-shadow 0.3s;
  box-shadow:0 8px 15px rgba(0,0,0,0.2);
}
.invite-btn:hover {transform:scale(1.05);box-shadow:0 12px 20px rgba(0,0,0,0.3);}

/* Sezione About piccola, flottante */
.about {
  position:absolute;
  bottom:30px;
  right:30px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.3);
  padding:20px 30px;
  max-width:250px;
  text-align:center;
  animation: floatSmall 4s ease-in-out infinite;
  font-size:0.95rem;
}
.about small {display:block;margin-top:5px;color:#ddd;}

/* Animazioni */
@keyframes float {0%,100%{transform:translateY(0);}50%{transform:translateY(-15px);}}
@keyframes floatSmall {0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes fadeIn {0%{opacity:0;transform:translateY(-20px);}100%{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<nav>
  <div class="logo"><strong>AmicoChill</strong></div>
  <div class="nav-links">
    <a href="#invite">Invita Bot</a>
    <a href="#about">About Me</a>
  </div>
</nav>

<div class="card" id="invite">
  <h1>AmicoChill Bot</h1>
  <p>Un bot Discord creato per rendere le tue chat più divertenti e interattive. Animazioni, comandi utili e tanto altro!</p>
  <a class="invite-btn" href="LINK_DI_INVITO_DEL_BOT" target="_blank">Invita Bot</a>
</div>

<div class="about" id="about">
  <h3>About Me</h3>
  <p>Sviluppo texture e bot Discord. Grazie al mio lavoro è nato <strong>AmicoChill</strong>.</p>
  <small>Developer & Creator</small>
</div>

</body>
</html>
