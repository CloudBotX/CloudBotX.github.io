<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AmicoChill</title>

<!-- EMBED -->
<meta property="og:title" content="AmicoChill Bot">
<meta property="og:description" content="Un bot Discord moderno, veloce e completamente personalizzabile.">
<meta property="og:image" content="TUO_FILE_IMMAGINE.png">
<meta property="og:url" content="https://cloudbotx.github.io">
<meta name="theme-color" content="#2f6cff">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins;
}

body {
    background:#050816;
    color:white;
}

/* 🌊 LIQUID /
.bg {
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at 20% 30%, rgba(47,108,255,0.3), transparent),
    radial-gradient(circle at 80% 70%, rgba(0,200,255,0.2), transparent);
    filter:blur(80px);
    animation:move 10s infinite alternate;
    z-index:-1;
}

@keyframes move {
    0% {transform:translateY(0);}
    100% {transform:translateY(-40px);}
}

/ 💎 NAVBAR MIGLIORATA /
.navbar {
    position:fixed;
    top:0;
    width:100%;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;

    backdrop-filter:blur(15px);
    background:rgba(10,15,40,0.7);
    border-bottom:1px solid rgba(255,255,255,0.08);

    z-index:10;
}

.navbar h2 {
    font-weight:600;
}

.navbar a {
    color:white;
    text-decoration:none;
    opacity:0.8;
    transition:0.2s;
}

.navbar a:hover {
    opacity:1;
}

/ HERO /
.hero {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:0 20px;
}

.hero h1 {
    font-size:65px;
    margin-bottom:10px;
}

.hero p {
    max-width:500px;
    opacity:0.75;
    line-height:1.5;
}

/ 🔵 BUTTON */
.btn {
    margin-top:25px;
    padding:18px 50px;
    font-size:18px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#2f6cff,#00c6ff);
    color:white;
    box-shadow:0 0 40px rgba(47,108,255,0.6);
    cursor:pointer;
    transition:0.3s;
}

.btn:hover {
    transform:scale(1.08);
    box-shadow:0 0 60px rgba(47,108,255,1);
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- NAVBAR -->
<div class="navbar">
    <h2>AmicoChill</h2>
    <a href="about.html">About</a>
</div>

<!-- HERO -->
<section class="hero">

    <!-- 🔥 QUI METTI LA TUA IMMAGINE -->
    <!-- Metti il file nella stessa cartella e cambia il nome sotto -->
    <img src="TUO_FILE_IMMAGINE.png" style="width:120px; margin-bottom:20px; border-radius:12px;">

    <h1>AmicoChill Bot</h1>

    <p>
        Un bot Discord avanzato progettato per migliorare la gestione del server,
        automatizzare le funzioni e offrire strumenti potenti in modo semplice e veloce.
    </p>

    <button class="btn" onclick="inviteBot()">Invita il Bot</button>
</section>

<script>
function inviteBot() {
window.open("https://discord.com/oauth2/authorize?client_id=1479189696893419663&permissions=8&scope=bot+applications.commands");
}
</script>

</body>
</html>
