<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmicoChill Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body {
  background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
  overflow:hidden;
}

/* Navbar */
nav {
  position:absolute;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  backdrop-filter:blur(10px);
  background: rgba(255,255,255,0.1);
}
nav a {
  color:#fff;
  text-decoration:none;
  margin-left:20px;
  font-weight:600;
}
nav a:hover {color:#ffd700;}

/* Card */
.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  padding: 60px 40px;
  text-align:center;
  animation: float 6s ease-in-out infinite;
}

.card h1 {font-size:3rem;margin-bottom:20px;}
.card p {font-size:1.2rem;margin-bottom:30px;}

/* Bottone */
.invite-btn {
  padding:20px 40px;
  font-size:1.5rem;
  font-weight:bold;
  color:#fff;
  background: linear-gradient(135deg, #ff6ec4, #7873f5);
  border:none;
  border-radius:15px;
  cursor:pointer;
  transition: transform 0.3s, box-shadow 0.3s;
  box-shadow:0 8px 15px rgba(0,0,0,0.2);
}
.invite-btn:hover {
  transform: scale(1.05);
  box-shadow:0 12px 20px rgba(0,0,0,0.3);
}

/* Modale */
.modal-bg {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.4);
  backdrop-filter:blur(5px);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.3);
  padding:30px;
  max-width:350px;
  text-align:center;
  animation: pop 0.3s ease;
}

.modal h2 {margin-bottom:15px;}
.modal label {display:block;margin:20px 0;}
.modal button {
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background: linear-gradient(135deg, #ff6ec4, #7873f5);
  color:#fff;
  cursor:pointer;
}
.modal button:disabled {opacity:0.5;cursor:not-allowed;}

/* Animazioni */
@keyframes float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
}
@keyframes pop {
  0%{transform:scale(0.8);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}
</style>
</head>
<body>

<nav>
  <div><strong>AmicoChill</strong></div>
  <div>
    <a href="about.html">Chi Sono</a>
  </div>
</nav>

<div class="card">
  <h1>AmicoChill Bot</h1>
  <p>Un bot Discord creato per rendere le tue chat più divertenti e interattive.</p>
  <button class="invite-btn" id="open">Invita Bot</button>
</div>

<!-- MODALE -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>Invita il Bot</h2>
    <p>Per continuare devi accettare i termini e la privacy.</p>
    
    <label>
      <input type="checkbox" id="check"> Accetto termini e privacy
    </label>

    <button id="invite" disabled>Continua</button>
  </div>
</div>

<script>
const modal = document.getElementById('modal');
const open = document.getElementById('open');
const check = document.getElementById('check');
const invite = document.getElementById('invite');

// Apri popup
open.onclick = () => modal.style.display = "flex";

// Abilita bottone
check.onchange = () => {
  invite.disabled = !check.checked;
};

// Invito bot
invite.onclick = () => {
  window.open("https://discord.com/oauth2/authorize?client_id=1479189696893419663&permissions=8&integration_type=0&scope=bot+applications.commands", "_blank");
};
</script>

</body>
</html>
