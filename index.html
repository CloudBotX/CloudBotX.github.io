<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AmicoChill</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins;
}

html, body {
    height:100%;
    background:#050816;
    color:white;
    overflow:hidden;
}

/ * 🌊 BACKGROUND LIQUIDO /
.bg {
    position:fixed;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at 20% 30%, rgba(47,108,255,0.35), transparent),
        radial-gradient(circle at 80% 70%, rgba(0,200,255,0.25), transparent);
    filter:blur(90px);
    animation:move 12s infinite alternate ease-in-out;
    z-index:-1;
}

@keyframes move {
    0% {transform:translateY(0);}
    100% {transform:translateY(-60px);}
}

/ 💎 NAVBAR AZZURRA LIQUID GLASS /
.navbar {
    position:fixed;
    top:0;
    width:100%;
    padding:18px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;

    backdrop-filter:blur(20px);
    background:rgba(47,108,255,0.6);
    border-bottom:1px solid rgba(0,200,255,0.6);
    box-shadow:0 8px 20px rgba(0,150,255,0.3);
    border-radius:0 0 15px 15px;
    z-index:100;
}

.navbar h2 {
    font-weight:600;
    color:white;
}

.navbar a,
.navbar a:visited,
.navbar a:active,
.navbar a:focus {
    color:white !important;
    text-decoration:none !important;
    opacity:0.9;
    margin-left:20px;
    font-weight:500;
}

.navbar a:hover {
    opacity:1;
    text-shadow:0 0 8px rgba(0,255,255,0.6);
}

/ HERO CENTRATO /
.hero {
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    height:100vh;
    gap:20px;
    padding:0 20px;
}

/ IMMAGINE RAPPRESENTATIVA DEL BOT /
.hero img {
    width:160px;
    border-radius:16px;
    animation:float 4s infinite ease-in-out;
}

@keyframes float {
    0% {transform:translateY(0);}
    50% {transform:translateY(-10px);}
    100% {transform:translateY(0);}
}

.hero h1 {
    font-size:65px;
    color:white;
    text-shadow:0 0 20px rgba(0,200,255,0.5);
}

.hero p {
    max-width:520px;
    opacity:0.75;
}

/ 🔵 BUTTON CENTRALE */
.btn {
    margin-top:25px;
    padding:18px 60px;
    font-size:18px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#2f6cff,#00c6ff);
    color:white;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 50px rgba(0,180,255,0.7);
    transition:0.3s;
}

.btn:hover {
    transform:scale(1.1);
    box-shadow:0 0 80px rgba(0,180,255,1);
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- NAVBAR -->
<div class="navbar">
    <h2>AmicoChill</h2>
    <div>
        <a href="about.html">About</a>
    </div>
</div>

<!-- HERO -->
<section class="hero">
    <!-- METTI QUI L’IMMAGINE RAPPRESENTATIVA DEL BOT -->
    <img src="bot-image.png" alt="AmicoChill Bot">

    <h1>AmicoChill Bot</h1>

    <p>
        Bot Discord avanzato progettato per automatizzare, gestire e migliorare
        qualsiasi server in modo semplice, veloce e completamente personalizzabile.
    </p>

    <button class="btn" onclick="inviteBot()">Invita il Bot</button>
</section>

<script>
function inviteBot() {
    window.open("https://discord.com/oauth2/authorize?client_id=1479189696893419663&permissions=8&scope=bot+applications.commands");
}
</script>

</body>
</html>
