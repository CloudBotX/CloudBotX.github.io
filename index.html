<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AmicoChill Bot</title>

<!-- 🟦 META OG -->
<meta property="og:title" content="AmicoChill Bot">
<meta property="og:description" content="Il bot Discord perfetto per rendere le chat più divertenti e interattive.">
<meta property="og:image" content="https://i.imgur.com/7yUvePI.png">
<meta property="og:url" content="https://bot.amicochill.qzz.io">
<meta name="theme-color" content="#4da6ff">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body{
  background:linear-gradient(135deg,#a1c4fd,#c2e9fb);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
  overflow:hidden;
  position:relative;
}

/* 🌊 ONDE */
.wave{
  position:absolute;
  bottom:0;
  width:200%;
  height:200px;
  background:url('https://svgshare.com/i/uYb.svg') repeat-x;
  animation:waveMove 10s linear infinite;
  opacity:0.3;
}
.wave2{animation-duration:15s;opacity:0.2;}

@keyframes waveMove{
  from{transform:translateX(0);}
  to{transform:translateX(-50%);}
}

/* ✨ LUCI */
body::before,body::after{
  content:"";
  position:absolute;
  width:500px;height:500px;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.5;
  animation:move 10s infinite alternate;
}
body::before{background:#ff6ec4;top:10%;left:10%;}
body::after{background:#7873f5;bottom:10%;right:10%;}

@keyframes move{
  from{transform:translate(0,0);}
  to{transform:translate(40px,-40px);}
}

/* ✨ PARTICELLE */
.particle{
  position:absolute;
  width:6px;height:6px;
  background:#fff;
  border-radius:50%;
  opacity:0;
  animation:float 6s infinite;
}

@keyframes float{
  0%{opacity:0;}
  50%{opacity:0.8;}
  100%{opacity:0;transform:translateY(-100px);}
}

/* NAV */
nav{
  position:absolute;
  top:0;width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.1);
  z-index:2;
}

nav a{
  color:#fff;
  text-decoration:none;
  margin-left:20px;
}

nav a.active{
  font-weight:700;
}

/* CARD */
.card{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.1);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.3);
  padding:60px 40px;
  text-align:center;
  z-index:2;
}

/* BOTTONE */
.invite-btn{
  margin-top:20px;
  padding:20px 40px;
  font-size:1.5rem;
  background:linear-gradient(135deg,#ff6ec4,#7873f5);
  border:none;
  border-radius:15px;
  color:#fff;
  cursor:pointer;
}

/* MODALE */
.modal-bg{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(5px);
  z-index:999;
}

.modal{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:30px;
  width:90%;
  max-width:350px;
  text-align:center;
}

/* ✔ CHECKBOX GRANDE */
.check-container{
  display:flex;
  align-items:center;
  gap:12px;
  margin:25px 0;
  cursor:pointer;
  font-size:1.1rem;
}

.check-container input{
  width:22px;
  height:22px;
}

/* 💎 CONTINUA */
.continue-btn{
  width:100%;
  padding:15px;
  font-size:1.2rem;
  font-weight:bold;
  color:#fff;

  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.3);

  cursor:pointer;
  transition:0.3s;
}

.continue-btn:hover{
  transform:scale(1.05);
  background:rgba(255,255,255,0.2);
}

.continue-btn:disabled{
  opacity:0.5;
}
</style>
</head>

<body>

<!-- 🌊 ONDE -->
<div class="wave"></div>
<div class="wave wave2"></div>

<!-- ✨ PARTICELLE -->
<script>
for(let i=0;i<40;i++){
 let p=document.createElement("div");
 p.className="particle";
 p.style.left=Math.random()*100+"%";
 p.style.top=Math.random()*100+"%";
 p.style.animationDelay=Math.random()*6+"s";
 document.body.appendChild(p);
}
</script>

<nav>
<div><strong>AmicoChill</strong></div>
<div><a href="about.html">Chi Sono</a></div>
</nav>

<div class="card">
<h1>AmicoChill Bot</h1>
<p>Un bot Discord creato per rendere le tue chat più divertenti.</p>
<button class="invite-btn" id="open">Invita Bot</button>
</div>

<!-- 💎 MODALE NUOVA -->
<div class="modal-bg" id="modal">
<div class="modal">

<h2>Invita il Bot</h2>

<label class="check-container">
<input type="checkbox" id="check">
<span>Accetto i termini e la privacy</span>
</label>

<button id="invite" class="continue-btn" disabled>Continua</button>

</div>
</div>

<script>
const modal=document.getElementById('modal');
const open=document.getElementById('open');
const check=document.getElementById('check');
const invite=document.getElementById('invite');

open.onclick=()=>modal.style.display="flex";

check.onchange=()=>invite.disabled=!check.checked;

invite.onclick=()=>window.open(
"https://discord.com/oauth2/authorize?client_id=1479189696893419663&permissions=8&integration_type=0&scope=bot+applications.commands",
"_blank"
);

/* chiudi clic fuori */
modal.onclick=(e)=>{
 if(e.target===modal) modal.style.display="none";
};
</script>

</body>
</html>
