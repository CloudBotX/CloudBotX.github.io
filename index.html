<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AmicoChill Bot</title>

<!-- EMBED -->
<meta property="og:title" content="AmicoChill Bot">
<meta property="og:description" content="Il miglior bot Discord creato da RagazzoChill_ 🔥">
<meta property="og:image" content="https://mc-heads.net/avatar/RagazzoChill_/512">
<meta property="og:url" content="https://TUO-SITO.github.io">
<meta name="theme-color" content="#2f6cff">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #050816;
    color: white;
}

/* 🌊 LIQUID BACKGROUND /
.liquid {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 30%, rgba(47,108,255,0.25), transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(0,200,255,0.2), transparent 50%);
    filter: blur(80px);
    animation: move 12s infinite alternate ease-in-out;
    z-index: -1;
}

@keyframes move {
    0% { transform: translateY(0px); }
    100% { transform: translateY(-40px); }
}

/ 💎 NAVBAR /
.navbar {
    position: fixed;
    width: 100%;
    padding: 18px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;

    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.nav-links a {
    margin-left: 25px;
    color: white;
    text-decoration: none;
    opacity: 0.8;
}

/ 🎯 HERO /
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;

    text-align: center;
}

.hero h1 {
    font-size: 60px;
}

.hero p {
    opacity: 0.7;
}

/ 🔵 BIG BUTTON /
.btn {
    margin-top: 20px;
    padding: 18px 45px;
    font-size: 18px;
    border-radius: 14px;
    border: none;
    cursor: pointer;

    background: linear-gradient(135deg, #2f6cff, #00c6ff);
    box-shadow: 0 0 40px rgba(47,108,255,0.6);
    color: white;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 60px rgba(47,108,255,1);
}

/ 📦 SEZIONE /
.section {
    padding: 120px 40px;
    text-align: center;
}

/ 👤 ABOUT /
.about img {
    width: 130px;
    border-radius: 12px;
    margin-bottom: 15px;
}

/ 💎 CARDS */
.cards {
    margin-top: 40px;
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.card {
    width: 220px;
    padding: 30px;
    border-radius: 15px;

    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.08);

    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 25px rgba(0,200,255,0.4);
}
</style>
</head>

<body>

<div class="liquid"></div>

<div class="navbar">
    <h2>AmicoChill</h2>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#about">About</a>
    </div>
</div>

<!-- HERO -->
<section class="hero">
    <h1>AmicoChill Bot</h1>
    <p>Bot Discord moderno, veloce e potente</p>

    <button class="btn" onclick="inviteBot()">Invita il Bot</button>
</section>

<!-- ABOUT -->
<section class="section about" id="about">
    <img src="https://mc-heads.net/avatar/RagazzoChill_/120">
    <h2>RagazzoChill_</h2>
    <p>Esperto nel creare e configurare bot Discord. Studia diversi linguaggi di programmazione.</p>

    <div class="cards">
        <div class="card">Java</div>
        <div class="card">Skript</div>
        <div class="card">Python</div>
    </div>
</section>

<script>
function inviteBot() {
    window.open("https://discord.com/oauth2/authorize?client_id=1479189696893419663&permissions=8&integration_type=0&scope=bot+applications.commands");
}
</script>

</body>
</html>
