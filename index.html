<!DOCTYPE html>
<html lang="it">
<head>
  <!-- Meta tag per embed Discord / social preview -->
<meta property="og:title" content="AmicoChill Bot">
<meta property="og:description" content="Un bot Discord creato per rendere le tue chat più divertenti e interattive!">
<meta property="og:image" content="https://cloudbotx.github.io/2025-11-30_10.22.18.jpeg">
<meta property="og:url" content="https://cloudbotx.github.io/index.html">
<meta property="og:type" content="website">
<meta property="theme-color" content="#3498db">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmicoChill Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body {
  background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  color:#fff;
}

/* Navbar */
nav {
  position:absolute;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  backdrop-filter:blur(10px);
  background: rgba(255,255,255,0.1);
  animation: fadeIn 1s ease forwards;
}
nav a {
  color:#fff;
  text-decoration:none;
  margin-left:20px;
  font-weight:600;
  transition: color 0.3s;
}
nav a:hover {color:#ffd700;}

/* Card principale */
.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  padding: 60px 40px;
  text-align:center;
  animation: float 6s ease-in-out infinite;
  z-index:1;
}
.card h1 {font-size:3rem;margin-bottom:20px;}
.card p {font-size:1.2rem;margin-bottom:30px;}

/* Pulsante grande */
.invite-btn {
  display:inline-block;
  padding:20px 40px;
  font-size:1.5rem;
  font-weight:bold;
  color:#fff;
  background: linear-gradient(135deg, #ff6ec4, #7873f5);
  border:none;
  border-radius:15px;
  cursor:pointer;
  text-decoration:none;
  transition: transform 0.3s, box-shadow 0.3s;
  box-shadow:0 8px 15px rgba(0,0,0,0.2);
}
.invite-btn:hover {transform:scale(1.05);box-shadow:0 12px 20px rgba(0,0,0,0.3);}

/* Animazioni */
@keyframes float {0%,100%{transform:translateY(0);}50%{transform:translateY(-15px);}}
@keyframes fadeIn {0%{opacity:0;transform:translateY(-20px);}100%{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<nav>
  <div class="logo"><strong>AmicoChill</strong></div>
  <div class="nav-links">
    <a href="about.html">About Me</a>
  </div>
</nav>

<div class="card">
  <h1>AmicoChill Bot</h1>
  <p>Un bot Discord creato per rendere le tue chat più divertenti e interattive. Animazioni, comandi utili e tanto altro!</p>
  
  <!-- Pulsante Invita Bot -->
  <a class="invite-btn" href="https://discord.com/oauth2/authorize?client_id=1479189696893419663&permissions=8&integration_type=0&scope=bot+applications.commands" target="_blank">
    Invita Bot
  </a>
</div>

</body>
</html>
