<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AmicoChill Bot</title>

<!-- EMBED -->
<meta property="og:title" content="AmicoChill Bot">
<meta property="og:description" content="Il miglior bot Discord creato da RagazzoChill_ 🔥">
<meta property="og:image" content="https://mc-heads.net/avatar/RagazzoChill_/512">
<meta property="og:url" content="https://cloudbotx.github.io/">
<meta name="theme-color" content="#2196f3">
<meta name="twitter:card" content="summary_large_image">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: radial-gradient(circle at top, #08142f, #02050f);
    color: white;
    overflow-x: hidden;
}

/* 🌊 ONDE /
.wave {
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,150,255,0.1), transparent 70%);
    animation: waveMove 10s infinite linear;
    z-index: 0;
}

.wave:nth-child(2) {
    animation-duration: 15s;
    opacity: 0.5;
}

@keyframes waveMove {
    0% { transform: translate(-20%, -20%); }
    50% { transform: translate(10%, 10%); }
    100% { transform: translate(-20%, -20%); }
}

/ NAVBAR /
.navbar {
    position: fixed;
    width: 100%;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    z-index: 10;
}

.nav-links a {
    margin-left: 20px;
    color: white;
    text-decoration: none;
}

/ HERO /
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1;
    position: relative;
    text-align: center;
}

.hero h2 {
    font-size: 55px;
}

/ BUTTON /
.btn {
    margin-top: 20px;
    padding: 14px 30px;
    border-radius: 12px;
    background: linear-gradient(45deg, #2196f3, #00c6ff);
    border: none;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(0,150,255,0.8);
}

/ ABOUT /
.about {
    text-align: center;
    padding: 100px 20px;
    position: relative;
    z-index: 1;
}

/ 🎮 SKIN 3D /
.skin {
    width: 150px;
    margin: auto;
    transform-style: preserve-3d;
    animation: rotate 6s infinite linear;
}

.skin img {
    width: 100%;
    border-radius: 10px;
}

@keyframes rotate {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
}

/ CARDS /
.cards {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.card {
    width: 220px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(25px);
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

/ ✨ HOVER WOW /
.card:hover {
    transform: scale(1.08);
    box-shadow: 0 0 30px rgba(0,200,255,0.6);
}

/ luce che segue mouse */
.card::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,200,255,0.3), transparent 60%);
    opacity: 0;
    transition: 0.3s;
}

.card:hover::before {
    opacity: 1;
}

</style>
</head>

<body>

<div class="wave"></div>
<div class="wave"></div>

<div class="navbar">
    <h2>AmicoChill</h2>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#about">About</a>
    </div>
</div>

<section class="hero">
    <h2>AmicoChill Bot</h2>
    <p>Bot Discord potente e professionale 🚀</p>
    <button class="btn" onclick="inviteBot()">Invita il Bot</button>
</section>

<section class="about" id="about">

    <div class="skin">
        <img src="https://mc-heads.net/body/RagazzoChill_/150">
    </div>

    <h2>RagazzoChill_</h2>
    <p>Esperto nella creazione e configurazione di bot Discord. Studia diversi linguaggi di programmazione.</p>

    <div class="cards">
        <div class="card">Java</div>
        <div class="card">Skript</div>
        <div class="card">Python</div>
    </div>

</section>

<script>
function inviteBot() {
    window.open("https://discord.com/oauth2/authorize?client_id=1479189696893419663&permissions=8&integration_type=0&scope=bot+applications.commands");
}
</script>

</body>
</html>
