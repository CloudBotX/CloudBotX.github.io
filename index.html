<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmicoChill Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body {
  background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
  overflow:hidden;
  position:relative;
}

/* 🌊 LUCE ACQUA */
body::before, body::after {
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.5;
  animation: floatLight 10s infinite alternate ease-in-out;
}

body::before {
  background:#ff6ec4;
  top:10%;
  left:10%;
}

body::after {
  background:#7873f5;
  bottom:10%;
  right:10%;
  animation-delay:2s;
}

/* ✨ PARTICELLE */
.particle {
  position:absolute;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  opacity:0;
  animation: sparkle 6s infinite;
}

@keyframes sparkle {
  0% {opacity:0; transform:translateY(0);}
  50% {opacity:0.8;}
  100% {opacity:0; transform:translateY(-100px);}
}

@keyframes floatLight {
  0% {transform:translateY(0) translateX(0);}
  100% {transform:translateY(-40px) translateX(40px);}
}

/* Navbar */
nav {
  position:absolute;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  backdrop-filter:blur(10px);
  background: rgba(255,255,255,0.1);
  z-index:2;
}

nav a {
  color:#fff;
  text-decoration:none;
  margin-left:20px;
  font-weight:600;
}

/* Card */
.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  padding: 60px 40px;
  text-align:center;
  animation: float 6s ease-in-out infinite;
  z-index:2;
}

.card h1 {font-size:3rem;margin-bottom:20px;}
.card p {font-size:1.2rem;margin-bottom:30px;}

/* Bottone */
.invite-btn {
  padding:20px 40px;
  font-size:1.5rem;
  font-weight:bold;
  color:#fff;
  background: linear-gradient(135deg, #ff6ec4, #7873f5);
  border:none;
  border-radius:15px;
  cursor:pointer;
}

@keyframes float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
}

/* MODALE */
.modal-bg {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  justify-content:center;
  align-items:center;
}

.modal {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.3);
  padding:30px;
  text-align:center;
}

</style>
</head>

<body>

<!-- PARTICELLE -->
<script>
for(let i=0;i<40;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.top=Math.random()*100+"%";
  p.style.animationDelay=Math.random()*6+"s";
  document.body.appendChild(p);
}
</script>

<nav>
  <div><strong>AmicoChill</strong></div>
  <div>
    <a href="about.html">Chi Sono</a>
  </div>
</nav>

<div class="card">
  <h1>AmicoChill Bot</h1>
  <p>Un bot Discord creato per rendere le tue chat più divertenti e interattive.</p>
  <button class="invite-btn" id="open">Invita Bot</button>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>Invita il Bot</h2>
    <label>
      <input type="checkbox" id="check"> Accetto termini
    </label>
    <button id="invite" disabled>Continua</button>
  </div>
</div>

<script>
const modal = document.getElementById('modal');
const open = document.getElementById('open');
const check = document.getElementById('check');
const invite = document.getElementById('invite');

open.onclick = () => modal.style.display = "flex";
check.onchange = () => invite.disabled = !check.checked;
invite.onclick = () => window.open("https://discord.com/oauth2/authorize?client_id=1479189696893419663&permissions=8&scope=bot");
</script>

</body>
</html>
